<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Сайт перегружен</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -5px;
        }

        h2 {
            font-size: 1.5rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Бесконечная загрузка */
        .loader {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }

        .loader-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top: 4px solid #ff416c;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader-circle-inner {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 4px solid transparent;
            border-top: 4px solid #ff4b2b;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Эффект свечения сзади */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 65, 108, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    
    <div class="container">
        <h1>404</h1>
        <h2>Сайт перегружен</h2>
        <p>Слишком много запросов. Пожалуйста, подождите...</p>
        
        <div class="loader">
            <div class="loader-circle"></div>
            <div class="loader-circle-inner"></div>
        </div>
    </div>

</body>
</html>
