<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaryad Shop — Домофон Сервис</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&display=swap');
        :root { --accent: #ffd11a; --bg: #f4f6f9; --border: #e6e8eb; --text: #1a1d21; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; }
        
        header { background: #fff; padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 20px; text-decoration: none; color: inherit; cursor: pointer; }
        .logo span { background: #000; color: #fff; padding: 2px 6px; border-radius: 6px; margin-left: 5px; }
        
        .btn-main { background: var(--accent); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-danger { background: #ff4d4d; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .container { padding: 20px 6%; max-width: 1200px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #fff; border: 1px solid var(--border); padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: 700; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }

        .section { display: none; }
        .section.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 24px; padding: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; text-align: center; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 18px; object-fit: cover; background: #f9f9f9; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 24px; width: 350px; max-height: 85vh; overflow-y: auto; }
        
        .chat-box { height: 280px; overflow-y: auto; background: #f8f9fa; border-radius: 15px; padding: 10px; border: 1px solid var(--border); margin: 10px 0; }
        .msg { background: #fff; padding: 8px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; border: 1px solid #eee; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        
        .pay-option { background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom:10px; cursor:pointer; font-weight:700; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; outline: none; }
        
        .order-card { background: #fff; padding: 15px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<header>
    <div class="logo" onclick="location.reload()">SNARYAD<span>SHOP</span></div>
    <div id="user-area"><button class="btn-main" onclick="openMod('auth-modal')">Войти</button></div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('shop', this)">🛒 Витрина</button>
        <button class="tab-btn" id="orders-tab-btn" onclick="switchTab('orders', this)" style="display:none;">📦 Заказы</button>
    </div>

    <div id="shop" class="section active">
        <div class="grid">
            <div class="card" onclick="window.buyItem('Снаряд', '3 соуса', 'snaryad.png')">
                <img src="snaryad.png" onerror="this.src='https://placehold.co/200?text=Снаряд'">
                <h3>Снаряд</h3><div style="font-weight:800">3 соуса</div>
            </div>
            <div class="card" onclick="window.buyItem('Мина', '1 соус', 'mina.png')">
                <img src="mina.png" onerror="this.src='https://placehold.co/200?text=Мина'">
                <h3>Мина</h3><div style="font-weight:800">1 соус</div>
            </div>
            <div class="card" onclick="window.buyItem('Парашут', '1 соус', 'parashut.png')">
                <img src="parashut.png" onerror="this.src='https://placehold.co/200?text=Парашут'">
                <h3>Парашут</h3><div style="font-weight:800">1 соус</div>
            </div>
            <div class="card" onclick="window.buyItem('Всякий кал', '4 соуса', 'kal.png')">
                <img src="kal.png" onerror="this.src='https://placehold.co/200?text=Кал'">
                <h3>Всякий кал</h3><div style="font-weight:800">4 соуса</div>
            </div>
            <div class="card" onclick="window.buyItem('Обмазать домофон', '3 соуса', 'obmaz.png', true)">
                <img src="obmaz.png" onerror="this.src='https://placehold.co/200?text=Домофон'">
                <h3>Обмазать домофон</h3><div style="font-weight:800">3 соуса</div>
            </div>
        </div>
    </div>

    <div id="orders" class="section">
        <div id="admin-only" style="display:none;"><button class="btn-danger" onclick="window.clearAllOrders()">🗑 Очистить заказы</button></div>
        <div id="orders-list"></div>
    </div>
</div>

<div id="address-modal" class="modal">
    <div class="modal-content">
        <h3>Детали заказа</h3>
        <p>Укажите куда ехать:</p>
        <input type="text" id="order-addr" placeholder="Улица и дом">
        <input type="text" id="order-podezd" placeholder="Номер подъезда">
        <button class="btn-main" style="width:100%" onclick="window.confirmAddress()">Далее к оплате</button>
    </div>
</div>

<div id="pay-modal" class="modal">
    <div class="modal-content">
        <div id="pay-options">
            <h3>Оплата</h3>
            <div class="pay-option" onclick="window.createOrder('Сырный соус')">🧀 Сырный соус</div>
            <div class="pay-option" onclick="window.createOrder('Тар-тар')">⚪ Тар-тар</div>
            <div class="pay-option" onclick="window.createOrder('Обмен')">🔄 Оплата обменом</div>
        </div>
        <div id="chat-ui" style="display:none;">
            <h3 id="chat-header">Чат по заказу</h3>
            <div class="chat-box" id="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <button onclick="window.promptImg()" style="border-radius:12px; border:1px solid #ccc; width:40px; cursor:pointer;">🖼</button>
                <input type="text" id="chat-in" placeholder="Сообщение..." style="margin:0;">
            </div>
            <button class="btn-main" style="width:100%; margin-top:10px;" onclick="window.sendMsg()">Отправить</button>
            <div id="admin-btns" style="display:none; margin-top:10px; gap:5px;">
                <button onclick="window.updStat('Выдан')" style="flex:1; background:#d4edda; border:none; padding:10px; border-radius:10px;">✅ Готово</button>
                <button onclick="window.updStat('Отклонен')" style="flex:1; background:#f8d7da; border:none; padding:10px; border-radius:10px;">❌ Отмена</button>
            </div>
        </div>
        <button onclick="window.closeModals()" style="width:100%; border:none; background:none; margin-top:15px; color:gray; cursor:pointer;">Закрыть</button>
    </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <h2>Вход</h2>
        <input type="text" id="l-user" placeholder="Логин">
        <input type="password" id="l-pass" placeholder="Пароль">
        <button class="btn-main" style="width:100%" id="auth-go">Войти / Рег</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLmvHA8eEptL5eURhRzJLL155RXWQ30eg",
        authDomain: "snaryadshop.firebaseapp.com",
        projectId: "snaryadshop",
        storageBucket: "snaryadshop.firebasestorage.app",
        databaseURL: "https://snaryadshop-default-rtdb.firebaseio.com",
        appId: "1:116196873617:web:eef10cd8ce23b84165b630"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let user = null, isAdmin = false, selectedOrderId = null, tempItem = null, addressData = null;

    window.openMod = (id) => { document.getElementById(id).style.display='flex'; };
    window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); };
    window.switchTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    };

    onAuthStateChanged(auth, (u) => {
        if (u) {
            user = u; const nick = u.email.split('@')[0];
            isAdmin = (nick === 'snaryadadmin');
            document.getElementById('user-area').innerHTML = `<b>👤 ${nick}</b>`;
            document.getElementById('orders-tab-btn').style.display = 'block';
            if (isAdmin) document.getElementById('admin-only').style.display = 'block';
            loadOrders();
        }
    });

    document.getElementById('auth-go').onclick = async () => {
        const u = document.getElementById('l-user').value, p = document.getElementById('l-pass').value;
        try { await signInWithEmailAndPassword(auth, u + "@s.com", p); } catch { await createUserWithEmailAndPassword(auth, u + "@s.com", p); }
        window.closeModals();
    };

    window.buyItem = (name, price, img, needAddr = false) => {
        if(!user) { window.openMod('auth-modal'); return; }
        tempItem = { name, price };
        addressData = null;
        if(needAddr) { window.openMod('address-modal'); }
        else { window.openMod('pay-modal'); document.getElementById('pay-options').style.display='block'; document.getElementById('chat-ui').style.display='none'; }
    };

    window.confirmAddress = () => {
        const a = document.getElementById('order-addr').value, p = document.getElementById('order-podezd').value;
        if(!a || !p) return alert("Заполни данные!");
        addressData = `📍 Адрес: ${a}, Подъезд: ${p}`;
        window.closeModals();
        window.openMod('pay-modal');
        document.getElementById('pay-options').style.display='block';
        document.getElementById('chat-ui').style.display='none';
    };

    window.createOrder = async (method) => {
        const nick = user.email.split('@')[0];
        const newRef = push(ref(db, 'orders'));
        const orderId = newRef.key;
        let startMsg = `Заказ создан! Оплата: ${method}. Ожидайте.`;
        if(addressData) startMsg += `\n${addressData}`;

        const data = {
            id: orderId, user: nick, item: tempItem.name, status: 'Ожидание',
            chat: [{ from: 'Система', text: startMsg }]
        };
        await set(newRef, data);
        
        // TG NOTIFY
        let tgText = `🆕 ЗАКАЗ: ${tempItem.name}\nЮзер: ${nick}\nОплата: ${method}`;
        if(addressData) tgText += `\n${addressData}`;
        fetch(`https://api.telegram.org/bot8782923361:AAFmJdvhUGzKeIeaW9f4XSvAmZMDXLBRZgU/sendMessage?chat_id=8208159801&text=${encodeURIComponent(tgText)}`);
        
        window.openChat(orderId);
    };

    window.loadOrders = () => {
        onValue(ref(db, 'orders'), (snap) => {
            const list = document.getElementById('orders-list'); list.innerHTML = "";
            snap.forEach(child => {
                const o = child.val(); const nick = user.email.split('@')[0];
                if (isAdmin || o.user === nick) {
                    const div = document.createElement('div'); div.className = 'order-card';
                    div.innerHTML = `<div><b>${o.item}</b><br><small>${o.user}</small></div><span>${o.status}</span>`;
                    div.onclick = () => window.openChat(child.key);
                    list.appendChild(div);
                }
            });
        });
    };

    window.openChat = (id) => {
        selectedOrderId = id;
        document.getElementById('pay-options').style.display='none';
        document.getElementById('chat-ui').style.display='block';
        document.getElementById('admin-btns').style.display = isAdmin ? 'flex' : 'none';
        window.openMod('pay-modal');
        onValue(ref(db, `orders/${id}`), (snap) => {
            const o = snap.val(); if(!o) return;
            const box = document.getElementById('chat-box');
            box.innerHTML = o.chat.map(m => `
                <div class="msg"><b>${m.from}:</b> <div>${m.text.startsWith('http') ? `<img src="${m.text}">` : m.text}</div></div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = () => {
        const txt = document.getElementById('chat-in').value; if(!txt) return;
        const nick = user.email.split('@')[0];
        onValue(ref(db, `orders/${selectedOrderId}`), (s) => {
            const o = s.val(); const newChat = [...(o.chat || []), { from: nick, text: txt }];
            update(ref(db, `orders/${selectedOrderId}`), { chat: newChat });
            document.getElementById('chat-in').value = "";
        }, { onlyOnce: true });
    };

    window.promptImg = () => {
        const url = prompt("Ссылка на скриншот:");
        if(url && url.startsWith('http')) { document.getElementById('chat-in').value = url; window.sendMsg(); }
    };

    window.updStat = (s) => { update(ref(db, `orders/${selectedOrderId}`), { status: s }); };
    window.clearAllOrders = async () => { if(confirm("Удалить всё?")) await remove(ref(db, 'orders')); };

</script>
</body>
</html>
